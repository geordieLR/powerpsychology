[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/services"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/our-people"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/trauma-ptsd"
  to = "/services/trauma-ptsd.html"
  status = 301

[[redirects]]
  from = "/anxiety"
  to = "/services/anxiety.html"
  status = 301

[[redirects]]
  from = "/emdr-therapy"
  to = "/services/emdr.html"
  status = 301
